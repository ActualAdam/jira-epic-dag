name: Release

on:
  push:
    tags:
      - "v*"
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: |
          go vet ./...
          go build ./...

      - name: Set version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Build binaries
        run: |
          LDFLAGS="-X main.version=${{ steps.version.outputs.VERSION }}"

          GOOS=darwin GOARCH=arm64 go build -ldflags "$LDFLAGS" -o jira-epic-dag-darwin-arm64 ./cmd/jira-epic-dag
          GOOS=linux GOARCH=amd64 go build -ldflags "$LDFLAGS" -o jira-epic-dag-linux-amd64 ./cmd/jira-epic-dag

      - name: Generate checksums
        run: sha256sum jira-epic-dag-* > checksums.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            jira-epic-dag-darwin-arm64
            jira-epic-dag-linux-amd64
            checksums.txt
