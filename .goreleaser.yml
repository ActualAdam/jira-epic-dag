version: 2

builds:
  - main: ./cmd/jira-epic-dag
    binary: jira-epic-dag
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - arm64
      - amd64
    goamd64:
      - v1
    ldflags:
      - -s -w
      - -X main.version={{.Version}}

archives:
  - formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

release:
  github:
    owner: ActualAdam
    name: jira-epic-dag

homebrew_casks:
  - name: jira-epic-dag
    repository:
      owner: ActualAdam
      name: homebrew-tap
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    homepage: https://github.com/ActualAdam/jira-epic-dag
    description: TUI app that visualizes Jira epic dependency graphs
